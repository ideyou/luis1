<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Carros Esportivos</title>

    <style>

        /* RESET */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        /* FUNDO */
        body{

            /* Papel de parede carros esportivos */
            background:
            linear-gradient(rgba(0,0,0,0.60), rgba(0,0,0,0.60)),
            url('https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=1920&auto=format&fit=crop');

            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* CAIXA LOGIN */
        .login-box{

            width:100%;
            max-width:420px;

            padding:40px;

            border-radius:18px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(10px);

            border:1px solid rgba(255,255,255,0.2);

            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }

        /* TITULO */
        .login-box h2{

            text-align:center;

            color:white;

            margin-bottom:30px;

            font-size:32px;

            letter-spacing:2px;
        }

        /* INPUTS */
        .input-group{

            margin-bottom:22px;
        }

        .input-group label{

            display:block;

            margin-bottom:8px;

            color:white;

            font-size:15px;
        }

        .input-group input{

            width:100%;

            padding:14px;

            border:none;

            outline:none;

            border-radius:10px;

            background:rgba(255,255,255,0.15);

            color:white;

            font-size:16px;
        }

        .input-group input::placeholder{

            color:#ddd;
        }

        /* BOTÃO */
        .btn-entrar{

            width:100%;

            padding:14px;

            border:none;

            border-radius:10px;

            background:linear-gradient(45deg,#ff0000,#ff5e00);

            color:white;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;

            text-decoration:none;

            display:inline-block;

            text-align:center;
        }

        .btn-entrar:hover{

            transform:scale(1.03);

            background:linear-gradient(45deg,#ff5e00,#ff0000);

            box-shadow:0 0 15px rgba(255,0,0,0.7);
        }

        /* LINKS */
        .links{

            margin-top:18px;

            text-align:center;

            color:white;

            font-size:14px;
        }

        .links a{

            color:#ffffff;

            text-decoration:none;
        }

        .links a:hover{

            text-decoration:underline;
        }

        /* MARCAS */
        .marcas{

            margin-top:20px;

            text-align:center;

            color:#fff;

            font-size:13px;

            line-height:24px;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>SPORT CARS</h2>

        <form action="validar.php" method="POST">

            <div class="input-group">

                <label>Usuário ou E-mail</label>

                <input 
                    type="text"
                    placeholder="Digite seu usuário"
                    required
                >

            </div>

            <div class="input-group">

                <label>Senha</label>

                <input 
                    type="password"
                    placeholder="Digite sua senha"
                    required
                >

            </div>

            <a href="2pagina.html" class="btn-entrar">
                ENTRAR
            </a>

        </form>

        <div class="links">

            <p><a href="#">Esqueci minha senha</a></p>

            <p style="margin-top:10px;">
                Não tem conta? <a href="#">Cadastre-se</a>
            </p>

        </div>

        <div class="marcas">

            Lamborghini • Porsche • McLaren • Ferrari <br>
            Audi • Bugatti • BMW • Mercedes

        </div>

    </div>

</body>
</html>
