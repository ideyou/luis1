<!-- Música -->
<audio id="musica">
    <source src="musica.mp4" type="audio/mpeg">

</audio>

<!-- Botões -->
<button class="play" onclick="tocarMusica()">
    ▶ Tocar Música
</button>

<button class="pause" onclick="pausarMusica()">
    ⏸ Pausar Música
</button>

<script>
    // Pega o áudio
    const musica = document.getElementById("musica");

    // Função tocar

    }

    // Função pausar
    function pausarMusica(){
        musica.pause();
    }
</script>
